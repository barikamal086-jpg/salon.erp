<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa360 - Dashboard de Faturamento</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Axios para requisições HTTP -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Font Awesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
  <!-- Design System Override (deve vir DEPOIS do Tailwind para ter prioridade) -->
  <link rel="stylesheet" href="css/design-system.css">

  <style>
    :root {
      /* Primary Colors */
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --secondary: #64748B;
      --accent: #F59E0B;

      /* Status Colors */
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --info: #3B82F6;

      /* Restaurant Colors */
      --salao: #10B981;
      --ifood: #EF4444;
      --keeta: #8B5CF6;
      --99food: #F59E0B;

      /* Backgrounds */
      --bg-primary: #FFFFFF;
      --bg-secondary: #F8FAFC;
      --bg-dark: #1E293B;

      /* Text */
      --text-primary: #1E293B;
      --text-secondary: #64748B;

      /* Borders */
      --border: #E2E8F0;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--secondary);
    }

    body {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div id="app" class="flex h-screen">
    <!-- LOGIN SCREEN -->
    <div v-if="!isAuthenticated" class="w-full flex items-center justify-center bg-gradient-to-br from-blue-50 to-blue-100">
      <div class="bg-white rounded-lg shadow-2xl p-8 w-96">
        <div style="text-align: center; margin-bottom: 32px;">
          <svg width="80" height="40" viewBox="0 0 120 60" style="margin: 0 auto 16px; display: block;">
            <g>
              <path d="M 20 30 Q 25 20 35 20 Q 45 20 50 30 Q 45 40 35 40 Q 25 40 20 30" fill="none" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
              <path d="M 50 30 Q 55 20 65 20 Q 75 20 80 30 Q 75 40 65 40 Q 55 40 50 30" fill="none" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
              <g transform="translate(68, 22)"><polygon points="0,0 5,8 10,0 7,4 12,4 12,2 7,2" fill="#F59E0B"/></g>
            </g>
          </svg>
          <h1 style="font-size: 28px; font-weight: 700; color: #111827; margin: 0;">Caixa360</h1>
          <p style="color: #6B7280; margin-top: 4px;">Bem-vindo de volta!</p>
        </div>

        <form @submit.prevent="fazerLogin">
          <div class="mb-4">
            <label style="display: block; font-weight: 600; color: #1F2937; margin-bottom: 8px;">Email</label>
            <input v-model="loginForm.email" type="email" placeholder="seu@email.com"
              style="width: 100%; padding: 12px; border: 1px solid #E5E7EB; border-radius: 8px; font-size: 14px;">
          </div>

          <div class="mb-6">
            <label style="display: block; font-weight: 600; color: #1F2937; margin-bottom: 8px;">Senha</label>
            <input v-model="loginForm.senha" type="password" placeholder="••••••••"
              style="width: 100%; padding: 12px; border: 1px solid #E5E7EB; border-radius: 8px; font-size: 14px;">
          </div>

          <button type="submit" :disabled="loginLoading"
            style="width: 100%; padding: 12px; background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); color: white; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; font-size: 16px;">
            {{ loginLoading ? '⏳ Entrando...' : '🔓 Entrar' }}
          </button>

          <div v-if="loginError" style="margin-top: 12px; padding: 12px; background: #FEE2E2; color: #7F1D1D; border-radius: 6px; font-size: 14px;">
            ❌ {{ loginError }}
          </div>
        </form>

        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid #E5E7EB;">
          <p style="color: #6B7280; font-size: 13px; text-align: center; margin: 0;">
            <strong>Demo - Credenciais dos Sócios:</strong><br>
            younes@kaia.com / younes123<br>
            bruno@kaia.com / bruno123<br>
            kamal@kaia.com / kamal123
          </p>
        </div>
      </div>
    </div>

    <!-- APP MAIN -->
    <template v-else>
    <!-- Sidebar -->
    <aside class="w-64" style="background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); position: fixed; height: 100vh; overflow-y: auto;">
      <!-- Logo -->
      <div style="padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center;">
        <svg width="120" height="60" viewBox="0 0 120 60" style="margin: 0 auto 12px; display: block;">
          <!-- Infinito com seta -->
          <g>
            <!-- Curva esquerda do infinito -->
            <path d="M 20 30 Q 25 20 35 20 Q 45 20 50 30 Q 45 40 35 40 Q 25 40 20 30" fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
            <!-- Curva direita do infinito -->
            <path d="M 50 30 Q 55 20 65 20 Q 75 20 80 30 Q 75 40 65 40 Q 55 40 50 30" fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
            <!-- Seta laranja -->
            <g transform="translate(68, 22)">
              <polygon points="0,0 5,8 10,0 7,4 12,4 12,2 7,2" fill="#F59E0B"/>
            </g>
          </g>
        </svg>
        <h1 style="font-size: 1.3rem; font-weight: 700; color: #FFFFFF; margin: 0; letter-spacing: 0.5px;">Caixa360</h1>
        <p style="color: #FFFFFF; font-size: 0.65rem; margin-top: 4px; letter-spacing: 0.3px; font-weight: 600;">ERP GESTÃO RESTAURANTE & DELIVERY</p>
      </div>

      <!-- Menu -->
      <nav style="padding: 16px; space: 8px;">
        <div
          @click="activeView = 'dashboard'"
          :class="activeView === 'dashboard' ? '' : 'opacity-80 hover:opacity-100'"
          style="padding: 12px 16px; border-radius: 8px; color: white; cursor: pointer; transition: all 0.2s; margin-bottom: 8px;"
          :style="activeView === 'dashboard' ? 'background: rgba(255,255,255,0.15); border-left: 4px solid white; padding-left: 12px;' : ''"
        >
          <i class="fas fa-chart-line mr-2"></i> Dashboard
        </div>
        <div
          @click="activeView = 'cmv-inteligente'"
          :class="activeView === 'cmv-inteligente' ? '' : 'opacity-80 hover:opacity-100'"
          style="padding: 12px 16px; border-radius: 8px; color: white; cursor: pointer; transition: all 0.2s; margin-bottom: 8px;"
          :style="activeView === 'cmv-inteligente' ? 'background: rgba(255,255,255,0.15); border-left: 4px solid white; padding-left: 12px;' : ''"
        >
          <i class="fas fa-brain mr-2"></i> 🧠 CMV Inteligente
        </div>
        <div
          @click="activeView = 'auditoria-cmv'"
          :class="activeView === 'auditoria-cmv' ? '' : 'opacity-80 hover:opacity-100'"
          style="padding: 12px 16px; border-radius: 8px; color: white; cursor: pointer; transition: all 0.2s;"
          :style="activeView === 'auditoria-cmv' ? 'background: rgba(255,255,255,0.15); border-left: 4px solid white; padding-left: 12px;' : ''"
        >
          <i class="fas fa-clipboard-list mr-2"></i> 📋 Auditoria CMV
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64 overflow-auto">
      <!-- Top Bar -->
      <div style="background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-bottom: 1px solid var(--border);">
        <div style="padding: 32px 16px; display: flex; justify-content: space-between; align-items: center;">
          <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary);">
            <span v-if="activeView === 'dashboard'">Dashboard</span>
            <span v-else-if="activeView === 'cmv-inteligente'">🧠 CMV Inteligente</span>
            <span v-else-if="activeView === 'auditoria-cmv'">📋 Auditoria de CMV</span>
          </h2>
          <div style="display: flex; align-items: center; gap: 16px;">
            <span style="color: var(--text-secondary); font-weight: 500;">👤 {{ usuario?.nome }}</span>
            <button @click="fazerLogout" style="padding: 8px 16px; background: #EF4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">
              🚪 Sair
            </button>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div v-show="activeView === 'dashboard'" class="p-8 space-y-6">

        <!-- Seletor de Período -->
        <div style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; border: 1px solid var(--border);">
          <h3 style="font-size: 1.125rem; font-weight: 700; color: var(--text-primary); margin-bottom: 16px;">📅 Selecione o Período</h3>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
            <div>
              <label style="display: block; font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">Data Início</label>
              <input
                v-model="periodo.dataInicio"
                type="date"
                @change="atualizarPeriodo"
                style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; font-family: inherit;"
              >
            </div>
            <div>
              <label style="display: block; font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">Data Fim</label>
              <input
                v-model="periodo.dataFim"
                type="date"
                @change="atualizarPeriodo"
                style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; font-family: inherit;"
              >
            </div>
            <div>
              <label style="display: block; font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">Atalhos</label>
              <div style="display: flex; gap: 8px;">
                <button
                  @click="setUltimos7Dias"
                  style="flex: 1; padding: 10px 12px; background: var(--primary); color: white; font-size: 0.9rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; transition: all 0.2s;"
                  @mouseenter="$event.target.style.background = 'var(--primary-dark)'"
                  @mouseleave="$event.target.style.background = 'var(--primary)'"
                >
                  Últimos 7d
                </button>
                <button
                  @click="setUltimos30Dias"
                  style="flex: 1; padding: 10px 12px; background: var(--primary); color: white; font-size: 0.9rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; transition: all 0.2s;"
                  @mouseenter="$event.target.style.background = 'var(--primary-dark)'"
                  @mouseleave="$event.target.style.background = 'var(--primary)'"
                >
                  Últimos 30d
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- KPIs Gerais -->
        <div style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; border: 1px solid var(--border);">
          <h3 style="font-size: 1.125rem; font-weight: 700; color: var(--text-primary); margin-bottom: 24px;">📊 Indicadores de Performance</h3>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;">
            <!-- Receita -->
            <div style="border-radius: 8px; padding: 16px; background: white; border: 1px solid var(--border); border-left: 4px solid var(--success);">
              <p style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; margin-bottom: 8px;">💰 Total Receita</p>
              <p style="font-size: 1.75rem; font-weight: 700; color: var(--success);">R$ {{ formatarValor(stats.totalReceita) }}</p>
            </div>
            <!-- Despesa -->
            <div style="border-radius: 8px; padding: 16px; background: white; border: 1px solid var(--border); border-left: 4px solid var(--error);">
              <p style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; margin-bottom: 8px;">💸 Total Despesa</p>
              <p style="font-size: 1.75rem; font-weight: 700; color: var(--error);">R$ {{ formatarValor(stats.totalDespesa) }}</p>
            </div>
            <!-- Líquido -->
            <div style="border-radius: 8px; padding: 16px; background: white; border: 1px solid var(--border); border-left: 4px solid var(--primary);">
              <p style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; margin-bottom: 8px;">📈 Total Líquido</p>
              <p style="font-size: 1.75rem; font-weight: 700; color: var(--primary);">R$ {{ formatarValor(stats.totalLiquido) }}</p>
            </div>
            <!-- Média Receita -->
            <div style="border-radius: 8px; padding: 16px; background: white; border: 1px solid var(--border); border-left: 4px solid var(--success);">
              <p style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; margin-bottom: 8px;">📊 Média Receita</p>
              <p style="font-size: 1.75rem; font-weight: 700; color: var(--success);">R$ {{ formatarValor(stats.mediaReceita) }}</p>
            </div>
            <!-- Média Despesa -->
            <div style="border-radius: 8px; padding: 16px; background: white; border: 1px solid var(--border); border-left: 4px solid var(--error);">
              <p style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; margin-bottom: 8px;">📊 Média Despesa</p>
              <p style="font-size: 1.75rem; font-weight: 700; color: var(--error);">R$ {{ formatarValor(stats.mediaDespesa) }}</p>
            </div>
            <!-- Dias -->
            <div style="border-radius: 8px; padding: 16px; background: white; border: 1px solid var(--border); border-left: 4px solid var(--info);">
              <p style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; margin-bottom: 8px;">📅 Dias</p>
              <p style="font-size: 1.75rem; font-weight: 700; color: var(--info);">{{ stats?.dias || 0 }}</p>
            </div>
          </div>
        </div>

        <!-- KPIs por Categoria -->
        <div style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; border: 1px solid var(--border);">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h3 style="font-size: 1.125rem; font-weight: 700; color: var(--text-primary); margin: 0;">🏷️ Performance por Categoria</h3>
            <div style="display: flex; gap: 8px; align-items: center;">
              <label style="font-size: 0.9rem; font-weight: 600; color: var(--text-primary);">Filtrar:</label>
              <select v-model="filtroCategoria" @change="atualizarFiltroCategoria" style="padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; font-family: inherit; min-width: 150px;">
                <option value="">✨ Todas</option>
                <option value="Salão">🍽️ Salão</option>
                <option value="iFood">🍔 iFood</option>
                <option value="Keeta">🥘 Keeta</option>
                <option value="99Food">🚗 99Food</option>
              </select>
            </div>
          </div>
          <div v-if="categoriasFiltradas.length > 0" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
            <div
              v-for="cat in categoriasFiltradas"
              :key="cat.categoria"
              style="border-radius: 8px; padding: 16px; background: white; border: 1px solid var(--border); border-left: 4px solid; transition: all 0.2s;"
              :style="{
                'border-left-color': cat.categoria === 'Salão' ? 'var(--salao)' :
                                   cat.categoria === 'iFood' ? 'var(--ifood)' :
                                   cat.categoria === '99Food' ? 'var(--99food)' :
                                   cat.categoria === 'Keeta' ? 'var(--keeta)' : 'var(--primary)'
              }"
              @mouseenter="$event.currentTarget.style.boxShadow = '0 4px 12px rgba(0,0,0,0.12)'"
              @mouseleave="$event.currentTarget.style.boxShadow = 'none'"
            >
              <div style="font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; color: var(--text-primary);">
                {{ cat.categoria }}
              </div>
              <div style="space-y: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                  <span style="font-size: 0.85rem; color: var(--success);">💰 Receita:</span>
                  <span style="font-size: 0.9rem; font-weight: 600; color: var(--success);">R$ {{ formatarValor(cat.totalReceita) }}</span>
                </div>
                <!-- Para iFood, Keeta, 99Food: mostrar Taxas e Despesas Alocadas -->
                <template v-if="cat.categoria !== 'Salão' && (cat.totalTaxas > 0 || cat.totalDespesasAlocadas > 0)">
                  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.8rem;">
                    <span style="color: var(--error);">🏷️ Taxas:</span>
                    <span style="font-weight: 600; color: var(--error);">R$ {{ formatarValor(cat.totalTaxas) }}</span>
                  </div>
                  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.8rem;">
                    <span style="color: var(--error);">📊 Despesas:</span>
                    <span style="font-weight: 600; color: var(--error);">R$ {{ formatarValor(cat.totalDespesasAlocadas) }}</span>
                  </div>
                </template>
                <!-- Para Salão: mostrar apenas Despesa Total -->
                <template v-else>
                  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span style="font-size: 0.85rem; color: var(--error);">💸 Despesa:</span>
                    <span style="font-size: 0.9rem; font-weight: 600; color: var(--error);">R$ {{ formatarValor(cat.totalDespesa) }}</span>
                  </div>
                </template>
                <div style="border-top: 1px solid var(--border); padding-top: 8px; display: flex; justify-content: space-between; align-items: center;">
                  <span style="font-size: 0.85rem; font-weight: 600; color: var(--primary);">📈 Líquido:</span>
                  <span style="font-size: 0.9rem; font-weight: 700; color: var(--primary);">R$ {{ formatarValor(cat.totalLiquido) }}</span>
                </div>
              </div>
              <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);">
                <div>{{ cat?.dias || 0 }} {{ (cat?.dias || 0) === 1 ? 'dia' : 'dias' }}</div>
                <div v-if="cat?.mediaReceita > 0">Média Receita: R$ {{ formatarValor(cat.mediaReceita) }}</div>
                <div v-if="cat?.mediaDespesa > 0">Média Despesa: R$ {{ formatarValor(cat.mediaDespesa) }}</div>
              </div>
            </div>
          </div>
          <div v-else style="color: var(--text-secondary); text-align: center; padding: 32px 0;">
            Nenhuma receita/despesa neste período
          </div>
        </div>

        <!-- Gráfico Mensal - INLINE -->
        <div style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; border: 1px solid var(--border);">
          <h3 style="font-size: 1.125rem; font-weight: 700; color: var(--text-primary); margin-bottom: 16px;">📊 Receitas vs Despesas por Dia</h3>
          <div style="margin-bottom: 24px; padding: 16px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--border);">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
              <div>
                <label style="display: block; font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">Mês</label>
                <select v-model="graficoMes" @change="renderizarGraficoMensal" style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; font-family: inherit;">
                  <option value="01">Janeiro</option>
                  <option value="02">Fevereiro</option>
                  <option value="03">Março</option>
                  <option value="04">Abril</option>
                  <option value="05">Maio</option>
                  <option value="06">Junho</option>
                  <option value="07">Julho</option>
                  <option value="08">Agosto</option>
                  <option value="09">Setembro</option>
                  <option value="10">Outubro</option>
                  <option value="11">Novembro</option>
                  <option value="12">Dezembro</option>
                </select>
              </div>
              <div>
                <label style="display: block; font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">Ano</label>
                <input v-model.number="graficoAno" type="number" @change="renderizarGraficoMensal" style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; font-family: inherit;">
              </div>
            </div>
          </div>
          <div class="w-full">
            <canvas id="graficoMensalInline" height="80"></canvas>
          </div>
        </div>

        <!-- Formulário + Tabela -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <!-- Formulário -->
          <div style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; border: 1px solid var(--border);">
            <h3 style="font-size: 1.125rem; font-weight: 700; color: var(--text-primary); margin-bottom: 16px;">📝 Lançar Receita/Despesa</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Tipo</label>
                <select v-model="novaReceita.tipo" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="receita">💰 Receita</option>
                  <option value="despesa">💸 Despesa</option>
                </select>
              </div>

              <!-- Campos específicos para DESPESA -->
              <div v-if="novaReceita.tipo === 'despesa'" class="border-l-4 border-orange-500 bg-orange-50 p-4 rounded">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Classificação da Despesa</label>

  <script>
    console.log('🔄 ===== VERSÃO ATUALIZADA v3 - TESTE SEM COMPONENTES =====');
    const { createApp, nextTick } = Vue;

    // ✅ Função helper para obter data local no formato YYYY-MM-DD (sem timezone issues)
    function getLocalDateISO(date = null) {
      const d = date ? new Date(date) : new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    // ✅ Converter data do input type="date" (vem como YYYY-MM-DD string)
    function parseInputDate(dateString) {
      if (!dateString || typeof dateString !== 'string') return dateString;
      // Se já está em formato YYYY-MM-DD, retornar como está
      if (dateString.match(/^\d{4}-\d{2}-\d{2}$/)) {
        return dateString;
      }
      return dateString;
    }

    const app = createApp({
      data() {
        return {
          // Autenticação
          isAuthenticated: false,
          token: localStorage.getItem('salon-erp-token'),
          usuario: null,
          loginForm: {
            email: '',
            senha: ''
          },
          loginLoading: false,
          loginError: '',

          // Views
          activeView: 'dashboard',
          cmvPeriodo: {
            dataInicio: this.obterDataInicio(),
            dataFim: this.obterDataFim()
          },
          cmvDados: null,
          cmvAnalise: null,
          cmvRestauranteSelecionado: null,
          carregandoAnaliseIA: false,
          auditoriaDados: null,
          auditoriaPeriodo: {
            dataInicio: this.obterDataInicio(),
            dataFim: this.obterDataFim()
          },
          periodo: {
            dataInicio: this.obterDataInicio(),
            dataFim: this.obterDataFim()
          },
          stats: {
            total: 0,
            media: 0,
            maior: 0,
            menor: 0,
            dias: 0
          },
          statsPorCategoria: [],
          filtroCategoria: '',
          categoriasFiltradas: [],
          categoriasDisponiveis: ['Todos (Grupo)', 'Salão', 'iFood', '99Food', 'Keeta'],
          outraCategoria: '',
          receitas: [],
          novaReceita: {
            data: getLocalDateISO(),
            total: null,
            categoria: 'Salão',
            tipo: 'receita',
            classificacao: '',
            tipoDespesaId: null
          },
          tiposDespesaAgrupados: {},
          subcategoriasDisponiveis: [],
          mostrarModalNovaCategoria: false,
          novaCategoria: {
            classificacao: '',
            subcategoria: '',
            descricao: ''
          },
          // Menu de Ações e Edição de Lançamentos
          menuAcoesAberto: null,
          mostrarModalEdicao: false,
          receitaEmEdicao: null,
          // Notas Fiscais
          notasPendentes: [],
          notasCategoria: {},
          notasEmProcessamento: [],
          notasStats: null,
          isDraggingFiles: false,
          tiposDespesaPlano: [],
          chart: null,
          // Sugestão de Data
          mostrarSugestaoData: false,
          sugestaoData: {
            fornecedor: '',
            sugestao: 'agora',
            data_sugerida: '',
            opcoes: {
              agora: { label: '', data: '', descricao: '' },
              futuro: { label: '', data: '', descricao: '' }
            }
          },
          dataCustomizada: '',
          notaIdAtualProcessamento: null,
          tipoDespesaIdAtualProcessamento: null,
          // Conta Azul Import
          arquivoContaAzul: null,
          importandoContaAzul: false,
          mensagemImportacao: '',
          importacaoSucesso: false,
          // Gráfico Mensal
          graficoMes: String(new Date().getMonth() + 1).padStart(2, '0'),
          graficoAno: new Date().getFullYear(),
          graficoMensalChart: null,
          // Despesa por Imagem
          isDraggingDespesa: false,
          processandoDespesaImagem: false,
          dadosDespesaExtraidos: null,
          despesaImagemSalva: false,
          tiposDespesaSimples: ['Salão', 'iFood', '99Food', 'Keeta'],
          novaCategoria: '',
          novaClassificacao: 'Operacional',
          categoriaIdMap: { 'Salão': null, 'iFood': null, '99Food': null, 'Keeta': null }, // Mapa de categoria -> ID
          // Histórico: Filtros e Paginação
          filtroHistorico: {
            dataInicio: this.obterDataInicioDomesMes(),
            dataFim: this.obterDataFimMes(),
            categoria: ''
          },
          paginacao: {
            paginaAtual: 1,
            porPagina: 10
          }
        };
      },

      watch: {
        periodo: {
          handler(newVal, oldVal) {
            console.log('👁️ Watcher: período mudou!');
            console.log('  Antigo:', oldVal);
            console.log('  Novo:', newVal);
            this.atualizarPeriodo();
          },
          deep: true
        }
      },

      computed: {
        // Categorias únicas do histórico
        categoriasUnicas() {
          const cats = [...new Set(this.receitas.map(r => r.categoria))];
          return cats.sort();
        },

        // Receitas filtradas por categoria e período
        receitasFiltradas() {
          return this.receitas.filter(r => {
            const dataOk = r.data >= this.filtroHistorico.dataInicio && r.data <= this.filtroHistorico.dataFim;
            const categoriaOk = !this.filtroHistorico.categoria || r.categoria === this.filtroHistorico.categoria;
            return dataOk && categoriaOk;
          });
        },

        // Receitas paginadas
        receitasPaginadas() {
          const inicio = (this.paginacao.paginaAtual - 1) * this.paginacao.porPagina;
          const fim = inicio + this.paginacao.porPagina;
          return this.receitasFiltradas.slice(inicio, fim);
        },

        // Total de páginas
        totalPaginas() {
          return Math.ceil(this.receitasFiltradas.length / this.paginacao.porPagina);
        },

        // Início e fim do registro mostrado
        inicioRegistro() {
          if (this.receitasFiltradas.length === 0) return 0;
          return (this.paginacao.paginaAtual - 1) * this.paginacao.porPagina + 1;
        },

        fimRegistro() {
          const fim = this.paginacao.paginaAtual * this.paginacao.porPagina;
          return Math.min(fim, this.receitasFiltradas.length);
        },

        // Resumo do filtrado (Receitas, Despesas, Total)
        resumoFiltrado() {
          const totalReceita = this.receitasFiltradas
            .filter(r => r.tipo === 'receita')
            .reduce((acc, r) => acc + (r.total || 0), 0);

          const totalDespesa = this.receitasFiltradas
            .filter(r => r.tipo === 'despesa')
            .reduce((acc, r) => acc + (r.total || 0), 0);

          return {
            totalReceita: totalReceita,
            totalDespesa: totalDespesa,
            totalLiquido: totalReceita - totalDespesa
          };
        }
      },

      methods: {
        async fazerLogin() {
          try {
            this.loginError = '';
            this.loginLoading = true;

            const response = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: this.loginForm.email,
                senha: this.loginForm.senha
              })
            });

            const resultado = await response.json();

            if (!resultado.success) {
              this.loginError = resultado.error || 'Erro ao fazer login';
              return;
            }

            // Salvar token e usuário
            this.token = resultado.token;
            this.usuario = resultado.usuario;
            this.isAuthenticated = true;
            localStorage.setItem('salon-erp-token', resultado.token);
            localStorage.setItem('salon-erp-usuario', JSON.stringify(resultado.usuario));

            // Limpar formulário
            this.loginForm.email = '';
            this.loginForm.senha = '';

            // Carregar dados
            this.carregarTiposDespesa();
            this.atualizarPeriodo();
            this.carregarNotasPendentes();
          } catch (error) {
            this.loginError = 'Erro ao conectar ao servidor: ' + error.message;
          } finally {
            this.loginLoading = false;
          }
        },

        fazerLogout() {
          this.isAuthenticated = false;
          this.token = null;
          this.usuario = null;
          localStorage.removeItem('salon-erp-token');
          localStorage.removeItem('salon-erp-usuario');
          this.loginForm.email = '';
          this.loginForm.senha = '';
        },

        obterDataInicio() {
          const hoje = new Date();
          const inicio = new Date(hoje.getTime() - 30 * 24 * 60 * 60 * 1000);
          return getLocalDateISO(inicio);
        },

        obterDataFim() {
          return getLocalDateISO();
        },

        // Para Histórico: Primeiro dia do mês atual
        obterDataInicioDomesMes() {
          const hoje = new Date();
          const primeiro = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
          return getLocalDateISO(primeiro);
        },

        // Para Histórico: Último dia do mês atual
        obterDataFimMes() {
          const hoje = new Date();
          const ultimo = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
          return getLocalDateISO(ultimo);
        },

        // Limpar filtros do histórico
        limparFiltrosHistorico() {
          this.filtroHistorico.dataInicio = this.obterDataInicioDomesMes();
          this.filtroHistorico.dataFim = this.obterDataFimMes();
          this.filtroHistorico.categoria = '';
          this.paginacao.paginaAtual = 1;
        },

        // CMV Inteligente Methods
        setCMVUltimos7Dias() {
          const hoje = new Date();
          const inicio = new Date(hoje.getTime() - 7 * 24 * 60 * 60 * 1000);
          this.cmvPeriodo.dataInicio = getLocalDateISO(inicio);
          this.cmvPeriodo.dataFim = getLocalDateISO(hoje);
          this.carregarDadosCMV();
        },

        setCMVUltimos30Dias() {
          const hoje = new Date();
          const inicio = new Date(hoje.getTime() - 30 * 24 * 60 * 60 * 1000);
          this.cmvPeriodo.dataInicio = getLocalDateISO(inicio);
          this.cmvPeriodo.dataFim = getLocalDateISO(hoje);
          this.carregarDadosCMV();
        },

        async carregarDadosCMV() {
          try {
            console.log('📊 Carregando dados de CMV:', this.cmvPeriodo, 'Restaurante:', this.cmvRestauranteSelecionado);
            this.cmvDados = null;

            let url = `${window.location.origin}/api/cmv-inteligente?from=${this.cmvPeriodo.dataInicio}&to=${this.cmvPeriodo.dataFim}`;
            if (this.cmvRestauranteSelecionado) {
              url += `&restaurante=${this.cmvRestauranteSelecionado}`;
            }

            const response = await fetch(url);
            const resultado = await response.json();

            if (resultado.success) {
              this.cmvDados = resultado.data;
              console.log('✅ Dados de CMV carregados:', this.cmvDados);

              // Renderizar gráfico de tendência
              setTimeout(() => this.renderizarGraficoTendenciaCMV(), 100);
            } else {
              console.error('❌ Erro ao carregar dados de CMV:', resultado.error);
              alert('Erro ao carregar dados: ' + resultado.error);
            }
          } catch (error) {
            console.error('❌ Erro na requisição:', error);
            alert('Erro ao carregar dados de CMV');
          }
        },

        async analisarCMVInteligente() {
          try {
            console.log('🔍 Gerando análise inteligente CMVAnalyzerV2...');
            this.carregandoAnaliseIA = true;

            if (!this.cmvDados) {
              alert('❌ Carregue os dados de CMV primeiro');
              return;
            }

            // Extrair período em formato YYYY-MM
            const dataInicio = new Date(this.cmvPeriodo.dataInicio);
            const mes = dataInicio.toISOString().slice(0, 7); // "2026-04"

            // Construir input para CMVAnalyzerV2
            const resumo = this.cmvDados.resumo;
            const cmvPorCategoria = {};

            // Montar cmvPorCategoria a partir de cmvDetalhado
            if (this.cmvDados.cmvDetalhado) {
              this.cmvDados.cmvDetalhado.forEach(item => {
                cmvPorCategoria[item.subcategoria] = item.total;
              });
            }

            // Taxas reais da categoria selecionada
            const taxasReais = resumo.totalTaxasReais || 0;
            const receitaLiquida = resumo.totalReceita - taxasReais;

            const payloadV2 = {
              mes: mes,
              restaurante: this.cmvRestauranteSelecionado ? `KAIA - ${this.cmvRestauranteSelecionado}` : 'KAIA - Consolidado',
              receita: {
                bruta: resumo.totalReceita,
                taxas: taxasReais,
                liquida: receitaLiquida
              },
              cmv: {
                sistema: resumo.totalCMV,
                cartaoItau: 0,
                cartaoBradesco: 0,
                total: resumo.totalCMV
              },
              cmvPorCategoria: cmvPorCategoria,
              benchmarks: {
                CMV_META: 22,
                CMV_ALERTA: 25,
                CMV_CRITICO: 30
              }
            };

            console.log('📤 Enviando dados para CMVAnalyzerV2:', payloadV2);

            const response = await fetch(`${window.location.origin}/api/cmv-v2/analisar`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payloadV2)
            });

            const resultado = await response.json();

            if (resultado.success && resultado.analise) {
              // Transformar resposta CMVAnalyzerV2 para formato frontend
              const analiseV2 = resultado.analise;
              this.cmvAnalise = this.transformarAnaliseCMVAnalyzerV2(analiseV2, this.cmvDados);
              console.log('✅ Análise CMVAnalyzerV2 recebida:', this.cmvAnalise);
              console.log('📋 Versão:', resultado.versao);
            } else {
              alert('❌ Erro: ' + (resultado.error || 'Não foi possível gerar análise'));
            }
          } catch (error) {
            console.error('❌ Erro ao analisar CMV:', error);
            alert('Erro ao analisar CMV: ' + error.message);
          } finally {
            this.carregandoAnaliseIA = false;
          }
        },

        transformarAnaliseCMVAnalyzerV2(analiseV2, cmvDados) {
          // Transformar estrutura CMVAnalyzerV2 para estrutura esperada pelo frontend
          const situacao = analiseV2.situacao;
          const problemas = analiseV2.problemas || [];
          const recomendacoes = analiseV2.recomendacoes || [];
          const porCategoria = analiseV2.porCategoria || {};

          // Mapear tipo de problema para emoji
          const emojiProblema = {
            'CMV_ACIMA_META': '📈',
            'DUPLICIDADE_DETECTADA': '🔄',
            'TAXA_PLATAFORMA_ALTA': '💸',
            'ANOMALIA_DADOS': '⚠️'
          };

          // Mapear prioridade de recomendação para emoji
          const emojiRecomendacao = {
            'ALTA': '🔴',
            'MÉDIA': '🟡',
            'BAIXA': '🟢'
          };

          // Converter problemas
          const problemasFormatados = problemas.map(p => ({
            emoji: emojiProblema[p.tipo] || '⚠️',
            tipo: p.tipo,
            descricao: p.descricao,
            impacto: p.impacto,
            severidade: p.severidade
          }));

          // Converter recomendações
          const recomendacoesFormatadas = recomendacoes.map(r => ({
            emoji: emojiRecomendacao[r.prioridade] || '💡',
            acao: r.acao,
            detalhes: r.detalhes,
            prioridade: r.prioridade,
            impacto: r.impacto || ''
          }));

          // Converter porCategoria em subcategoriaAnalise (top 5)
          const subcategoriaAnalise = Object.entries(porCategoria)
            .map(([cat, dados], idx) => ({
              posicao: idx + 1,
              subcategoria: cat,
              total: dados.valor,
              percentualReceita: dados.percentualRL,
              recomendacao: 'Monitorar e buscar otimizações'
            }))
            .slice(0, 5);

          // Calcular variação e status da tendência
          const variacao = parseFloat(analiseV2.cmv.variacao || 0);
          const tendenciaStatus = variacao < 0 ? '📉 Melhorando' : variacao > 0 ? '📈 Piorando' : '➡️ Estável';

          // Calcular impacto financeiro mensal
          const receitaLiquida = analiseV2.receita.liquida;
          const cmvAtual = parseFloat(analiseV2.cmv.percentualRL);
          const cmvIdeal = analiseV2.cmv.meta;
          const diferencaPercentual = cmvAtual - cmvIdeal;
          const impactoFinanceiro = (receitaLiquida * diferencaPercentual) / 100;

          return {
            situacao: {
              cor: situacao.cor,
              descricao: situacao.descricao,
              cmvPercentual: parseFloat(analiseV2.cmv.percentualRL),
              margemBruta: 100 - parseFloat(analiseV2.cmv.percentualRL),
              status: situacao.status,
              meta: analiseV2.cmv.meta
            },
            tendencias: {
              emoji: variacao < 0 ? '📉' : '📈',
              descricao: `CMV variou ${Math.abs(variacao || 0).toFixed(2)}% em relação ao período anterior`,
              status: tendenciaStatus,
              variacao: (variacao || 0).toFixed(2)
            },
            comparacao: {
              avaliacao: `CMV está em ${(cmvAtual || 0).toFixed(2)}%, meta é ${cmvIdeal}%`,
              cmvAtual: (cmvAtual || 0).toFixed(2),
              cmvIdeal: cmvIdeal,
              impactoMensal: {
                diferenca: impactoFinanceiro.toLocaleString('pt-BR', {
                  minimumFractionDigits: 2,
                  maximumFractionDigits: 2
                })
              }
            },
            problemas: problemasFormatados,
            recomendacoes: recomendacoesFormatadas,
            subcategoriaAnalise: subcategoriaAnalise,
            relatorio: this.gerarRelatorioCMVAnalyzer(analiseV2)
          };
        },

        gerarRelatorioCMVAnalyzer(analise) {
          return `=== ANÁLISE DE CMV — ${analise.mes} ===

📊 SITUAÇÃO: ${analise.situacao.status}
${analise.situacao.descricao}

💰 RECEITA LÍQUIDA: R$ ${(analise.receita.liquida || 0).toFixed(2)}
   (Bruta: R$ ${(analise.receita.bruta || 0).toFixed(2)} - Taxas: R$ ${(analise.receita.taxas || 0).toFixed(2)})

🎯 CMV: R$ ${analise.cmv.total} = ${analise.cmv.percentualRL}% (meta: ${analise.cmv.meta}%)
   Variação: ${analise.cmv.variacao > 0 ? '+' : ''}${analise.cmv.variacao}%

⚠️ PROBLEMAS: ${analise.problemas.length}
${analise.problemas.map(p => `   • ${p.tipo}: ${p.descricao}`).join('\n')}

💡 RECOMENDAÇÕES: ${analise.recomendacoes.length}
${analise.recomendacoes.map(r => `   • [${r.prioridade}] ${r.acao}: ${r.detalhes}`).join('\n')}`;
        },

        async carregarStatsPorCategoria() {
          try {
            console.log('📊 Carregando stats por categoria:', {
              dataInicio: this.periodo.dataInicio,
              dataFim: this.periodo.dataFim
            });

            // Carregar stats originais
            const response = await api.obterStatsPorCategoria(this.periodo.dataInicio, this.periodo.dataFim);
            // Carregar despesas alocadas
            const despesasResponse = await api.obterDespesasAlocadas(this.periodo.dataInicio, this.periodo.dataFim);

            if (response.data.success && despesasResponse.data.success) {
              const stats = response.data.data;
              const despesasAlocadas = despesasResponse.data.data;

              // Criar mapa de despesas alocadas por categoria
              const despesasMap = {};
              despesasAlocadas.forEach(d => {
                despesasMap[d.categoria] = d;
              });

              // Mesclar dados: separar taxas e despesas alocadas
              this.statsPorCategoria = stats.map(stat => {
                const despesa = despesasMap[stat.categoria];
                if (despesa) {
                  return {
                    ...stat,
                    totalTaxas: despesa.totalTaxas || 0,
                    totalDespesasAlocadas: despesa.totalDespesasAlocadas || 0,
                    totalDespesa: despesa.totalDespesa,
                    totalLiquido: despesa.totalLiquido,
                    mediaDespesa: despesa.totalDespesa / (stat.dias || 1) // Recalcular média com despesa total
                  };
                }
                return stat;
              });

              console.log('✅ Stats com despesas alocadas:', this.statsPorCategoria);
              this.atualizarFiltroCategoria();
            }
          } catch (error) {
            console.error('Erro ao carregar stats por categoria:', error);
          }
        },

        atualizarFiltroCategoria() {
          if (this.filtroCategoria === '') {
            this.categoriasFiltradas = [...this.statsPorCategoria];
          } else {
            this.categoriasFiltradas = this.statsPorCategoria.filter(cat => cat.categoria === this.filtroCategoria);
          }
          console.log('🔍 Categorias filtradas:', this.categoriasFiltradas);
          this.$forceUpdate();
        },

            alert('Preencha todos os campos');
            return;

          // Validar tipo de despesa se for despesa
          if (this.novaReceita.tipo === 'despesa' && !this.novaReceita.tipoDespesaId) {
            alert('Selecione a subcategoria para a despesa');
            return;
          }

          // Validar categoria obrigatória
          if (!this.novaReceita.categoria) {
            alert('Selecione uma categoria');
            return;
          }

          // Se "Outra", validar preenchimento
          if (this.novaReceita.categoria === 'outra' && !this.outraCategoria.trim()) {
            alert('Informe o nome da categoria');
            return;
          }

          const categoria = this.novaReceita.categoria === 'outra'
            ? this.outraCategoria.trim()
            : this.novaReceita.categoria;

          try {
            await api.criarFaturamento(
              this.novaReceita.data,
              this.novaReceita.total,
              categoria,
              this.novaReceita.tipo,
              this.novaReceita.tipoDespesaId
            );

            this.novaReceita.total = null;
            this.novaReceita.categoria = 'Salão';
            this.novaReceita.tipo = 'receita';
            this.novaReceita.classificacao = '';
            this.novaReceita.tipoDespesaId = null;
            this.subcategoriasDisponiveis = [];
            this.outraCategoria = '';

            alert('Erro ao salvar: ' + error.message);

            weekday: 'short',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
          });

              alert(`⚠️ ${response.data.errors.length} erro(s) encontrado(s).\n${response.data.errors[0].erro}`);

          } catch (error) {
            console.error('Erro ao enviar notas:', error);
            alert('❌ Erro ao processar arquivos. Verifique o console.');

            this.notasEmProcessamento = [];

          const tipo = this.tiposDespesaPlano.find(t => t.id == tipoDespesaId);

        // ==================== EXPORTAR NOTAS ====================

        exportarCSV() {
          if (this.notasPendentes.length === 0) {
            alert('❌ Nenhuma nota para exportar');
            return;
          }

          try {
            console.log('📊 Gerando CSV...');

            // Cabeçalhos
            const headers = ['Data', 'Número NF', 'Fornecedor', 'Descrição', 'Valor', 'Classificação', 'Status'];

            // Dados das notas
            const rows = this.notasPendentes.map(nota => [
              nota.data_emissao || 'N/A',
              nota.numero_nf || 'N/A',
              nota.fornecedor_nome || 'N/A',
              nota.descricao || 'N/A',
              parseFloat(nota.valor_total || 0).toFixed(2),
              nota.classificacao_sugerida || 'N/A',
              nota.status || 'N/A'
            ]);

            // Montar CSV
            let csv = headers.map(h => `"${h}"`).join(',') + '\n';
            csv += rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');

            // Criar blob e download
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            link.setAttribute('href', url);
            link.setAttribute('download', `notas-fiscais-${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            console.log('✅ CSV exportado com sucesso');
            alert(`✅ CSV exportado com ${this.notasPendentes.length} nota(s)`);
          } catch (error) {
            console.error('❌ Erro ao exportar CSV:', error);
            alert('❌ Erro ao exportar CSV');
          }
        },

        exportarExcel() {
          if (this.notasPendentes.length === 0) {
            alert('❌ Nenhuma nota para exportar');
            return;
          }

          try {
            console.log('📋 Gerando Excel...');

            // Verificar se xlsx está disponível
            const XLSX = window.XLSX || window.xlsx;
            if (!XLSX) {
              alert('⚠️ Biblioteca Excel não carregada. Usando CSV como alternativa.');
              this.exportarCSV();
              return;
            }

            // Preparar dados
            const dadosExcel = this.notasPendentes.map(nota => ({
              'Data': nota.data_emissao || 'N/A',
              'Número NF': nota.numero_nf || 'N/A',
              'Fornecedor': nota.fornecedor_nome || 'N/A',
              'Descrição': nota.descricao || 'N/A',
              'Valor': parseFloat(nota.valor_total || 0).toFixed(2),
              'Classificação': nota.classificacao_sugerida || 'N/A',
              'Status': nota.status || 'N/A'
            }));

            // Criar workbook
            const workbook = XLSX.utils.book_new();
            const worksheet = XLSX.utils.json_to_sheet(dadosExcel);

            // Ajustar largura das colunas
            worksheet['!cols'] = [
              { wch: 12 }, // Data
              { wch: 20 }, // Número NF
              { wch: 25 }, // Fornecedor
              { wch: 30 }, // Descrição
              { wch: 12 }, // Valor
              { wch: 18 }, // Classificação
              { wch: 12 }  // Status
            ];

            XLSX.utils.book_append_sheet(workbook, worksheet, 'Notas Fiscais');

            // Download
            XLSX.writeFile(workbook, `notas-fiscais-${new Date().toISOString().split('T')[0]}.xlsx`);

            console.log('✅ Excel exportado com sucesso');
            alert(`✅ Excel exportado com ${this.notasPendentes.length} nota(s)`);
          } catch (error) {
            console.error('❌ Erro ao exportar Excel:', error);
            alert('❌ Erro ao exportar Excel. Tente CSV.');

        async processarDespesaImagem(file) {
          try {
            this.processandoDespesaImagem = true;

            // Converter imagem para base64
            const reader = new FileReader();
            reader.onload = async (e) => {
              const base64 = e.target.result.split(',')[1];

              // Chamar API do backend
              try {
                // Detectar IP do servidor automaticamente
                const serverUrl = window.location.origin;
                const response = await fetch(serverUrl + '/api/processar-despesa-imagem', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ image: base64 })
                });

                const resultado = await response.json();

                if (resultado.success) {
                  this.dadosDespesaExtraidos = resultado.dados;
                  console.log('✅ Despesa extraída:', resultado.dados);
                } else {
                  alert('❌ Erro ao processar imagem: ' + resultado.error);
                }
              } catch (error) {
                console.error('❌ Erro na requisição:', error);
                alert('Erro ao processar imagem');
              } finally {
                this.processandoDespesaImagem = false;
              }
            };
            reader.readAsDataURL(file);
          } catch (error) {
            console.error('❌ Erro ao processar despesa:', error);
            this.processandoDespesaImagem = false;
          }
        },

        async renderizarGraficoMensal() {
          try {
            console.log('📊 Renderizando gráfico mensal:', this.graficoMes, '/', this.graficoAno);
            const dataInicio = `${this.graficoAno}-${this.graficoMes}-01`;
            const ultimoDia = new Date(this.graficoAno, parseInt(this.graficoMes), 0).getDate();
            const dataFim = `${this.graficoAno}-${this.graficoMes}-${String(ultimoDia).padStart(2, '0')}`;

            const response = await window.api.obterDadosGrafico(dataInicio, dataFim);
            if (response.data.success) {
              const dados = response.data.data;
              const diasDoMes = [];
              const receitas = [];
              const despesas = [];

              for (let i = 1; i <= ultimoDia; i++) {
                diasDoMes.push(i);
                const registro = dados.find(d => {
                  const partes = d.data.split('-');
                  return parseInt(partes[2]) === i;
                });
                receitas.push(registro ? parseFloat(registro.receita || 0) : 0);
                despesas.push(registro ? parseFloat(registro.despesa || 0) : 0);
              }

              const canvas = document.getElementById('graficoMensalInline');
              if (canvas && window.Chart) {
                if (this.graficoMensalChart) this.graficoMensalChart.destroy();
                const ctx = canvas.getContext('2d');
                this.graficoMensalChart = new window.Chart(ctx, {
                  type: 'line',
                  data: {
                    labels: diasDoMes,
                    datasets: [{
                      label: 'Receitas (R$)',
                      data: receitas,
                      borderColor: '#10b981',
                      backgroundColor: 'rgba(16, 185, 129, 0.1)',
                      tension: 0.4,
                      fill: true,
                      pointRadius: 4
                    }, {
                      label: 'Despesas (R$)',
                      data: despesas,
                      borderColor: '#ef4444',
                      backgroundColor: 'rgba(239, 68, 68, 0.1)',
                      tension: 0.4,
                      fill: true,
                      pointRadius: 4
                    }]
                  },
                  options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                      legend: { display: true, position: 'top' }
                    },
                    scales: {
                      y: {
                        beginAtZero: true,
                        ticks: {
                          stepSize: 5000,
                          callback: function(value) {
                            return 'R$ ' + value.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                          }
                        }
                      }
                    }
                  }
                });
              }
            }
          } catch (error) {
            console.error('❌ Erro ao renderizar gráfico:', error);
          }
        }
      },

      const inputInicio = document.getElementById('graficoDataInicio');
      const inputFim = document.getElementById('graficoDataFim');
      const grafico = window.graficoTendenciaInstance;

      if (!grafico && tentativas < 20) {
        setTimeout(inicializarSeletor, 200);
        return;

      if (!grafico) {
        console.error('❌ Gráfico não foi inicializado');
        return;
      }

      console.log('✅ Seletor do gráfico inicializado');

      if (inputInicio && inputFim) {
        const hoje = new Date();
        const inicio = new Date(hoje.getTime() - 30 * 24 * 60 * 60 * 1000);

        inputInicio.value = inicio.toISOString().split('T')[0];
        inputFim.value = hoje.toISOString().split('T')[0];

        // Função para atualizar gráfico
        function atualizarGrafico() {
          console.log('📊 Atualizando gráfico com datas:', inputInicio.value, inputFim.value);
          grafico.periodo.dataInicio = inputInicio.value;
          grafico.periodo.dataFim = inputFim.value;
          grafico.carregarDadosGrafico();
        }

        inputInicio.addEventListener('change', atualizarGrafico);
        inputFim.addEventListener('change', atualizarGrafico);
      }

      // Botões rápidos
      const btn7d = document.getElementById('graficoBtn7d');
      const btn30d = document.getElementById('graficoBtnMes');
      const btnEsteMes = document.getElementById('graficoBtnEsteMes');

      if (btn7d) {
        btn7d.addEventListener('click', () => {
          const hoje = new Date();
          const inicio = new Date(hoje.getTime() - 7 * 24 * 60 * 60 * 1000);
          inputInicio.value = inicio.toISOString().split('T')[0];
          inputFim.value = hoje.toISOString().split('T')[0];
          grafico.periodo.dataInicio = inputInicio.value;
          grafico.periodo.dataFim = inputFim.value;
          grafico.carregarDadosGrafico();
        });
      }

      if (btn30d) {
        btn30d.addEventListener('click', () => {
          const hoje = new Date();
          const inicio = new Date(hoje.getTime() - 30 * 24 * 60 * 60 * 1000);
          inputInicio.value = inicio.toISOString().split('T')[0];
          inputFim.value = hoje.toISOString().split('T')[0];
          grafico.periodo.dataInicio = inputInicio.value;
          grafico.periodo.dataFim = inputFim.value;
          grafico.carregarDadosGrafico();
        });
      }

      if (btnEsteMes) {
        btnEsteMes.addEventListener('click', () => {
          const hoje = new Date();
          const inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
          inputInicio.value = inicio.toISOString().split('T')[0];
          inputFim.value = hoje.toISOString().split('T')[0];
          grafico.periodo.dataInicio = inputInicio.value;
          grafico.periodo.dataFim = inputFim.value;
          grafico.carregarDadosGrafico();
        });
      }
    };

    inicializarSeletor();
  </script>
</body>
